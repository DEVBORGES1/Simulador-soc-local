<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador SOC Local - Híbrido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen flex flex-col p-4">

    <header class="mb-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-sky-400">SOC Simulator: Pipeline Híbrido</h1>
            <p class="text-sm text-slate-400">Regras Estáticas  + Heurística (LLM Local)</p>
        </div>
        <div class="flex space-x-4 text-sm">
            <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-emerald-400 mr-2"></span> Legítimo</span>
            <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-red-500 mr-2"></span> Ataque Óbvio</span>
            <span class="flex items-center"><span class="w-3 h-3 rounded-full bg-amber-400 mr-2"></span> Furtivo (Anomalia)</span>
        </div>
    </header>

    <main class="flex-1 flex gap-4 min-h-0">
        <aside class="w-80 bg-slate-800 p-4 rounded-lg shadow-lg flex flex-col overflow-y-auto">
            <h2 class="text-lg font-semibold mb-4 border-b border-slate-700 pb-2">Painel de Controle</h2>
            
            <div class="space-y-6">
                <!-- Controles de Tráfego -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Volume de Tráfego Geral</label>
                    <input type="range" id="trafficVolume" min="0" max="100" value="20" class="w-full accent-sky-500">
                    <div class="flex justify-between text-xs text-slate-500 mt-1"><span>Baixo</span><span>Alto</span></div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Velocidade da IA (Hardware)</label>
                    <input type="range" id="aiSpeed" min="10" max="200" value="50" class="w-full accent-fuchsia-500">
                    <div class="flex justify-between text-xs text-slate-500 mt-1"><span>Lenta (Gargalo)</span><span>Rápida</span></div>
                </div>

                <div class="border-t border-slate-700 pt-4 space-y-3">
                    <p class="text-sm font-medium text-slate-300">Injeção de Eventos</p>
                    <button id="btnNormal" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded shadow transition">
                        Gerar Tráfego Legítimo
                    </button>
                    <button id="btnObvious" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded shadow transition">
                        Ataque Óbvio (Ex: SQLi)
                    </button>
                    <button id="btnStealth" class="w-full bg-amber-600 hover:bg-amber-500 text-white py-2 rounded shadow transition">
                        Ataque Furtivo (Ex: Brute Force)
                    </button>
                </div>
                
                <div class="border-t border-slate-700 pt-4">
                    <div class="bg-slate-900 p-3 rounded text-sm">
                        <p class="text-slate-400 mb-1">Status da Fila IA:</p>
                        <div class="w-full bg-slate-700 rounded-full h-2.5">
                            <div id="queueBar" class="bg-fuchsia-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                        <p id="queueText" class="text-right text-xs mt-1 text-slate-400">0 / 50</p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-1 flex flex-col gap-4">
            <!-- Canvas Container -->
            <div class="flex-1 relative w-full h-full rounded-lg border border-slate-700 overflow-hidden" id="canvasContainer">
                <canvas id="simCanvas"></canvas>
            </div>

            <!-- Terminal Logs -->
            <div class="h-48 bg-black border border-slate-700 rounded-lg p-3 font-mono text-sm overflow-hidden flex flex-col">
                <div class="text-slate-500 text-xs mb-2 border-b border-slate-800 pb-1">LLM Output Terminal // /var/log/soc.log</div>
                <div id="logTerminal" class="log-panel flex-1 overflow-y-auto text-green-400 space-y-1">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
